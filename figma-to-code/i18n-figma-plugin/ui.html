<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: -apple-system, sans-serif; margin: 16px; font-size: 13px; }
    h2 { margin: 0 0 12px; font-size: 16px; }
    pre { background: #f5f5f5; padding: 12px; border-radius: 6px; overflow: auto; max-height: 340px; font-size: 12px; white-space: pre-wrap; }
    button { background: #18A0FB; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-top: 8px; }
    button:hover { background: #0d8ce0; }
    .info { color: #666; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h2>i18n Variable Exporter</h2>
  <div class="info" id="info">扫描中...</div>
  <pre id="output"></pre>
  <button id="copy" style="display:none">复制 JSON</button>

  <script>
    let jsonStr = ''
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage
      if (msg.type === 'error') {
        document.getElementById('info').textContent = '错误: ' + msg.message
        document.getElementById('output').textContent = msg.message
        return
      }
      if (msg.type === 'result') {
        jsonStr = JSON.stringify(msg.data, null, 2)
        document.getElementById('info').textContent = `找到 ${msg.count} 个 i18n 变量绑定`
        document.getElementById('output').textContent = jsonStr
        document.getElementById('copy').style.display = 'inline-block'
      }
    }
    document.getElementById('copy').onclick = () => {
      navigator.clipboard.writeText(jsonStr).then(() => {
        document.getElementById('copy').textContent = '已复制!'
        setTimeout(() => { document.getElementById('copy').textContent = '复制 JSON' }, 1500)
      })
    }
  </script>
</body>
</html>
